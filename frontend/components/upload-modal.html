<div class="modal fade" id="uploadModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="staticBackdropLabel">Julkaise</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="post-form" action="/api/create-post" method="POST">

          <div class="mb-3">
            <label for="title" class="col-form-label">Otsikko:</label>
            <input type="text" class="form-control" id="title" name="title" required minlength="3">
          </div>

          <div class="mb-3">
            <label for="post-content" class="col-form-label">Teksti:</label>
            <textarea class="form-control" rows="8" id="post-content" name="content" required minlength="3" maxlength="255"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Peruuta</button>
        <button type="submit" class="btn btn-primary" form="post-form">Julkaise</button>
      </div>
    </div>
  </div>
</div>
