<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kalakanta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous"> 
  <link href="./css/style.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"> 
</head>

<body>
  <div id="navbar-container"></div>
  <!-- haku ja järjestys -->
  <div class="container mb-3" id="filterBar">
    <div class="row align-items-center justify-content-center">
      <!-- Haku -->
        <div class="col-12 col-md-5">
          <form onsubmit="event.preventDefault(); runSearch();">
            <div class="input-group input-group-lg">
              <input type="search" class="form-control" placeholder="Hae..." id="forum-search" enterkeyhint="search">
              <button type="button" class="btn btn-outline-secondary search-button" id="forum-search-button" aria-label="Hae">
                <i class="fas fa-search" aria-hidden="true"></i>
              </button>
            </div>
          </form>
        </div>

      <!-- järjestys dropdown -->
      <div class="col-12 col-md-7 mt-3 mt-md-0 d-flex justify-content-end dropdown">
        <button class="btn btn-lg dropdown-toggle w-100" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="sorting">
          järjestele
        </button>
        <ul class="dropdown-menu">
          <li class="dropdown-item sorting-item" data-sort="likes-asc">Tykkäykset (Nouseva)</li>
          <li class="dropdown-item sorting-item" data-sort="likes-desc">Tykkäykset (Laskeva)</li>
          <li class="dropdown-item sorting-item" data-sort="newest">Uusin ensin</li>
          <li class="dropdown-item sorting-item" data-sort="oldest">Vanhin ensin</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- replies -->
  <div id="comments-modal-container"></div>

  <!-- lataa lisää julkaisuja -->
  <div class="container mt-4" id="forum-post-container">
    <ul class="list-unstyled" id="forum-post-list"></ul>

    <div class="d-flex justify-content-center mb-5">
      <button id="load-more-btn" class="btn btn-secondary mt-3">Lataa lisää</button>
    </div>
  </div>

  <!-- scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  <script src="./js/navbar.js"></script>
  <script src="./js/index.js"></script>
  <script src="./js/forum.js"></script>
</body>
</html>
