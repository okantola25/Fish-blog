<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kalakanta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"> 
  <link href="./css/style.css" rel="stylesheet">
</head>

<body>
  <div id="navbar-container"></div>
  
<!-- omat postaukset -->
<div class="container-sm">
  <div class="card password-card">
    <div class="password-title">Omat postaukset <span id="postCount">(0)</span></div>

    <div class="posts-box">
      <div class="post-item" id="postViewer">
        <h5 class="post-title" id="postTitle"></h5>
        <p class="post-text" id="postText"></p>
        <small id="postDate" class="text-muted"></small>

        <div class="post-item-actions">
          <button type="button" class="btn btn-delete-post" id="deletePostBtn" onclick="deleteCurrentPost()" aria-label="Poista julkaisu">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
      
      <div class="post-controls">
        <button type="button" class="btn btn-post-nav" onclick="previousPost()">Edellinen</button>
        <button type="button" class="btn btn-post-nav" onclick="nextPost()">Seuraava</button>
      </div>

    </div>
  </div>
</div> 

<!-- vaihda salasana -->
    <div class="container-sm">
      <div class="card password-card">
          <div class="password-title">Vaihda salasana</div>
            <form id="changePasswordForm">
              <label for="currentPassword" class="form-label">Nykyinen salasana</label>
                <input type="password" class="form-control" id="currentPassword">

                  <label for="newPassword" class="form-label">Uusi salasana</label>
                  <input type="password" class="form-control" id="newPassword">

                  <label for="confirmPassword" class="form-label">Vahvista salasana</label>
                <input type="password" class="form-control" id="confirmPassword">

              <button type="submit" class="btn btn-password mt-2">Lähetä</button>
            </form>
          </div>
    </div>
<!-- poista tili -->
  <div class="container-sm">
    <div class="card password-card">
      <div class="password-title">Poista tili</div>
          <form>
              <label for="deletePassword" class="form-label">Vahvista salasana</label>
              <input type="password" class="form-control" id="deletePassword">

              <button type="button" class="btn btn-delete mt-2" id="deleteBtn" onclick="showConfirmButtons()">
                Poista tili
              </button>

              <button type="button" class="btn btn-confirm mt-2 d-none" id="confirmDeleteBtn">
                Vahvista poisto
              </button>

              <button type="button" class="btn btn-cancel mt-2 d-none" id="cancelDeleteBtn" onclick="hideConfirmButtons()">
                Peruuta
              </button>
          </form>
    </div>
  </div>
  
      
  <script src="./js/navbar.js"></script>
  <script src="./js/index.js"></script>
  <script src="./js/profile.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</body>
</html>
