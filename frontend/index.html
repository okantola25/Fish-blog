<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kalakanta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous"> 
  <link href="./css/style.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>

<body>
   <!--navbar-->
  <nav class="navbar sticky-top navbar-expand-lg mb-3">
    <div class="container-fluid">
      <a class="navbar-brand" href=".\index.html">
        <img src="./assets/fish-svgrepo-com.svg" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
          Kalakanta
      </a>

      <div class="d-flex align-items-center ms-auto gap-2">
        <button type="button" class="btn" id="postButton">Post</button>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
      
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href=".\forum.html">Foorumi</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="index.html">Kalakanta</a>
          </li>
          
          <!--Kirjautumisen dropdown-->
          <li class="nav-item dropdown">
            <a class="nav-link active dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false" data-bs-auto-close="outside">
              Kirjaudu
            </a>
            <form class="dropdown-menu p-4">
              <div class="mb-3">
                <label for="exampleDropdownFormEmail2" class="form-label">Käyttäjänimi</label>
                <input type="email" class="form-control" id="exampleDropdownFormEmail2" placeholder="Käyttäjä123">
              </div>
              <div class="mb-3">
                <label for="exampleDropdownFormPassword2" class="form-label">Salasana</label>
                <input type="password" class="form-control" id="exampleDropdownFormPassword2" placeholder="Salasana">
              </div>
              <div class="mb-3">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" id="dropdownCheck2">
                  <label class="form-check-label" for="dropdownCheck2">
                    Remember me
                  </label>
                </div>
              </div>
              <button type="submit" class="btn btn-primary">Kirjaudu</button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!--haku ja järjestys-->
  <div class="container mb-3" id="filterBar">
    <div class="row justify-content-center">
      <!--Haku-->
      <div class="col-6">
        <div class="search-container">
          <input type="text" class="form-control search-input" placeholder="Search...">
          <i class="fas fa-search search-icon"></i>
        </div>
      </div>

      <!--järjestys dropdown-->
      <div class="col-6">
        <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="sorting">
          järjestele
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item sorting-item" href="#">Tykkäykset (Nouseva)</a></li>
          <li><a class="dropdown-item sorting-item" href="#">Tykkäykset (Laskeva)</a></li>
          <li><a class="dropdown-item sorting-item" href="#">muita vaihtoehtoja</a></li>
        </ul>
      </div>
    </div>
  </div>

  <!--kalakanta kortit-->
  <div class="container-fluid"> <!--sivun kattava containeri kortti gridille-->
    <div class="row g-3">

      <div class="col-6 col-md-4 col-lg-3 col-xl-2"> <!--bootstrap homma korttien sijoittelua varten. Vaatii jokaseen korttiin-->
        <div class="fish-card"> <!--kortti itessään-->
          <img src="https://kalaneuvos.fi/wp-content/uploads/2016/07/hauki-1-2400x1350-cropped.jpg">
          <button type="button" class="icon-link icon-link-hover" id="tykkays-hauki" aria-label="Tykkays: Hauki">
            <img src="./assets/likeoutline-svgrepo-com.svg" alt="" aria-hidden="true">
            <span class="tykkays-counter" id="tykkaykset-hauki">1000</span>
          </button>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="fish-card">
          <img src="https://kalaneuvos.fi/wp-content/uploads/2016/07/hauki-1-2400x1350-cropped.jpg">
          <button type="button" class="icon-link icon-link-hover" id="tykkays-hauki" aria-label="Tykkays: Hauki">
            <img src="./assets/likeoutline-svgrepo-com.svg" alt="" aria-hidden="true">
            <span class="tykkays-counter" id="tykkaykset-hauki2">1000</span>
          </button>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="fish-card">
          <img src="https://kalaneuvos.fi/wp-content/uploads/2016/07/hauki-1-2400x1350-cropped.jpg">
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="fish-card">
          <img src="https://kalaneuvos.fi/wp-content/uploads/2016/07/hauki-1-2400x1350-cropped.jpg">
        </div>
      </div>
      
      
      <div class="col-6 col-md-4 col-lg-3 col-xl-2"><div class="fish-card"><img src="https://placehold.co/150x150"></div></div>
      <div class="col-6 col-md-4 col-lg-3 col-xl-2"><div class="fish-card"><img src="https://placehold.co/150x150"></div></div>
      <div class="col-6 col-md-4 col-lg-3 col-xl-2"><div class="fish-card"><img src="https://placehold.co/150x150"></div></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  <script src="./js/index.js"></script>
</body>
</html>
