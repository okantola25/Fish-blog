<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kalakanta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous"> 
  <link href="./css/style.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>

<body>
   <!--navbar-->
  <nav class="navbar sticky-top navbar-expand-lg mb-3" id="navbar-container"></nav>

  <!--haku ja järjestys-->
  <div class="container mb-3" id="filterBar">
    <div class="row align-items-center justify-content-center">
      <!--Haku-->
      <div class="col-12 col-md-6 mb-3 mb-md-0">
          <form onsubmit="event.preventDefault(); loadFishCards();">
            <div class="input-group input-group-lg">
              <input type="search" class="form-control" placeholder="Hae..." id="kalakanta-search" enterkeyhint="search">
              <button type="button" class="btn btn-outline-secondary search-button" id="kalakanta-search-button" aria-label="Hae">
                <i class="fas fa-search" aria-hidden="true"></i>
              </button>
            </div>
          </form>
        </div>

      <!--järjestys dropdown-->
      <div class="col-12 col-md-6 d-flex justify-content-center justify-content-md-end dropdown">
        <button class="btn btn-lg dropdown-toggle w-100" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="sorting-fish">
          Järjestys
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item sorting-item-fish" href="#" data-sort="rating-desc">Arvosana (Korkein)</a></li>
          <li><a class="dropdown-item sorting-item-fish" href="#" data-sort="rating-asc">Arvosana (Alin)</a></li>
          <li><a class="dropdown-item sorting-item-fish" href="#" data-sort="name-asc">Nimi (A-Ö)</a></li>
          <li><a class="dropdown-item sorting-item-fish" href="#" data-sort="name-desc">Nimi (Ö-A)</a></li>
        </ul>
      </div>
    </div>
  </div>

  <!--kalakanta kortit-->
<div class="container-fluid"> 
  <div class="row g-3" id="fish-card-container">
  </div>
</div>
<div id="fishcard-modal-container"></div>

  <script src="./js/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  <script src="./js/index.js"></script>
</body>
</html>
